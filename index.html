<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ محطة بث الكاميرا المباشرة</title>
    <meta name="theme-color" content="#0e7490">
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        :root { 
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #0e7490;
            --secondary: #0284c7;
            --success: #16a34a;
            --danger: #dc2626;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 1.3rem;
            color: #38bdf8;
            margin: 0 0 5px 0;
        }

        .card {
            background-color: var(--card-dark);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-start { background-color: var(--primary); }
        .btn-qr { background-color: var(--secondary); margin-bottom: 12px; }
        .btn-stop { background-color: var(--danger); }

        .video-container {
            width: 100%;
            height: 240px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.75);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--danger);
        }

        .dot.active {
            background-color: var(--success);
        }

        #qr-reader-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        #qr-reader {
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎙️ محطة البث المباشر السريعة</h1>
        </div>

        <div class="card">
            <button class="btn btn-qr" onclick="openQrScanner()">📷 مسح الـ QR Code للربط</button>

            <div class="form-group">
                <label>عنوان الـ IP الخاص بالكمبيوتر:</label>
                <input type="text" id="serverIp" placeholder="192.168.1.X" value="192.168.1.">
            </div>

            <div class="form-group">
                <label>اسم الكاميرا:</label>
                <input type="text" id="deviceName">
            </div>

            <button id="btnAction" class="btn btn-start" onclick="toggleStream()">⚡ بدء البث الحي المباشر</button>
        </div>

        <div class="card" style="padding: 8px;">
            <div class="video-container">
                <div class="status-badge">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">غير متصل</span>
                </div>
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="captureCanvas" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <div id="qr-reader-container">
        <h3 style="color: #38bdf8; margin-bottom: 15px;">وجه الكاميرا نحو الـ QR</h3>
        <div id="qr-reader"></div>
        <button class="btn btn-stop" onclick="closeQrScanner()" style="margin-top: 15px; max-width: 150px;">إلغاء</button>
    </div>

    <script>
        let localStream = null;
        let isStreaming = false;
        let isProcessingFrame = false; // لمنع تراكم الأطر وتأخير المعالج
        let streamTimer = null;
        let wsSocket = null;
        let html5QrCode = null;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');
        
        document.getElementById('deviceName').value = "كاميرا-" + Math.floor(Math.random() * 800 + 100);

        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 480 }, height: { ideal: 360 } }, 
                    audio: false 
                });
                video.srcObject = localStream;
            } catch (err) {
                alert("يرجى السماح بالوصول للكاميرا: " + err.message);
            }
        }

        function openQrScanner() {
            document.getElementById('qr-reader-container').style.display = 'flex';
            html5QrCode = new Html5Qrcode("qr-reader");
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 200 },
                (decodedText) => {
                    try {
                        let parsedUrl = new URL(decodedText);
                        document.getElementById('serverIp').value = parsedUrl.hostname;
                    } catch (e) {
                        document.getElementById('serverIp').value = decodedText.replace("http://", "").replace("ws://", "").split(":")[0];
                    }
                    closeQrScanner();
                    toggleStream();
                },
                () => {}
            ).catch(err => {
                closeQrScanner();
            });
        }

        function closeQrScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById('qr-reader-container').style.display = 'none';
                }).catch(() => {
                    document.getElementById('qr-reader-container').style.display = 'none';
                });
            } else {
                document.getElementById('qr-reader-container').style.display = 'none';
            }
        }

        function toggleStream() {
            if (!isStreaming) {
                startWebSocketStream();
            } else {
                stopWebSocketStream();
            }
        }

        function startWebSocketStream() {
            const ip = document.getElementById('serverIp').value.trim();
            const name = document.getElementById('deviceName').value.trim();

            if (!ip || ip === "192.168.1." || ip.length < 7) {
                alert("يرجى إدخال IP صحيح للجهاز.");
                return;
            }

            const btn = document.getElementById('btnAction');
            const dot = document.getElementById('statusDot');
            const statusTxt = document.getElementById('statusText');

            btn.innerText = "⏳ جاري الاتصال...";
            btn.disabled = true;

            const wsUrl = `ws://${ip}:8585/live-stream?device=${encodeURIComponent(name)}`;
            
            try {
                wsSocket = new WebSocket(wsUrl);
                wsSocket.binaryType = 'arraybuffer';
            } catch (e) {
                alert("عنوان غير صحيح");
                resetUI();
                return;
            }

            // مهلة زمنية للاتصال لتجنب تعليق الزر
            const connectionTimeout = setTimeout(() => {
                if (wsSocket && wsSocket.readyState !== WebSocket.OPEN) {
                    wsSocket.close();
                    alert("تعذر الاتصال بالخادم. تأكد من تشغيل تطبيق الـ C# والـ IP.");
                    resetUI();
                }
            }, 4000);

            wsSocket.onopen = () => {
                clearTimeout(connectionTimeout);
                isStreaming = true;
                btn.disabled = false;
                btn.innerText = "🛑 إيقاف البث الحي";
                btn.className = "btn btn-stop";
                dot.className = "dot active";
                statusTxt.innerText = "بث حي متصل 🔴";

                canvas.width = 480;
                canvas.height = 360;

                // إرسال بمعدل 15 إطار/ثانية محكوم بالـ Backpressure لتخفيف العبء تماماً
                streamTimer = setInterval(processAndSendFrame, 66); 
            };

            wsSocket.onerror = () => {
                clearTimeout(connectionTimeout);
                resetUI();
            };

            wsSocket.onclose = () => {
                clearTimeout(connectionTimeout);
                if (isStreaming) stopWebSocketStream();
            };
        }

        function processAndSendFrame() {
            // إذا كان الإطار السابق لم ينتهِ من المعالجة والإرسال بعد، نتخطى هذا الإطار فوراً لمنع البطيء
            if (isProcessingFrame || !wsSocket || wsSocket.readyState !== WebSocket.OPEN) return;

            isProcessingFrame = true;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                if (blob && wsSocket && wsSocket.readyState === WebSocket.OPEN) {
                    blob.arrayBuffer().then(buffer => {
                        wsSocket.send(buffer);
                        isProcessingFrame = false;
                    }).catch(() => { isProcessingFrame = false; });
                } else {
                    isProcessingFrame = false;
                }
            }, 'image/jpeg', 0.4); // ضغط الصورة إلى 40% للحفاظ على السرعة وخفة الشبكة
        }

        function stopWebSocketStream() {
            isStreaming = false;
            if (streamTimer) clearInterval(streamTimer);
            
            if (wsSocket) {
                wsSocket.close();
                wsSocket = null;
            }

            resetUI();
        }

        function resetUI() {
            isStreaming = false;
            if (streamTimer) clearInterval(streamTimer);
            
            const btn = document.getElementById('btnAction');
            const dot = document.getElementById('statusDot');
            const statusTxt = document.getElementById('statusText');

            btn.disabled = false;
            btn.innerText = "⚡ بدء البث الحي المباشر";
            btn.className = "btn btn-start";
            dot.className = "dot";
            statusTxt.innerText = "غير متصل";
        }

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
