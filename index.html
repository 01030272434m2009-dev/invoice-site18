<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 محطة البث الحي الفائق (صوت وصورة)</title>
    <meta name="theme-color" content="#0f172a">
    
    <!-- مكتبة الـ QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        :root { 
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --success: #16a34a;
            --danger: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 0 6px 0;
            font-weight: 700;
        }

        .header p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card {
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-start { background-color: var(--primary); }
        .btn-start:hover { background-color: var(--primary-hover); }
        
        .btn-qr { 
            background: linear-gradient(135deg, #0e7490, #0284c7); 
            margin-bottom: 16px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-stop { background-color: var(--danger); }

        .video-card {
            padding: 10px;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: 280px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 8px var(--danger);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .dot.active {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* نافذة الـ QR Code Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-dark);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.25s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #qr-reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--accent);
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📡 محطة البث المباشر (صوت وصورة)</h1>
            <p>نقل فيديو وصوت عالي الدقة إلى تطبيق C# مباشرة</p>
        </div>

        <div class="card">
            <button class="btn btn-qr" onclick="openQrModal()">📷 قراءة QR Code تلقائيًا</button>

            <div class="form-group">
                <label>عنوان الـ IP والمنافذ:</label>
                <div class="input-row">
                    <input type="text" id="serverIp" placeholder="IP الكمبيوتر (مثال: 192.168.1.5)">
                    <input type="text" id="serverPort" value="8585" style="max-width: 90px;" placeholder="Port">
                </div>
            </div>

            <button id="btnAction" class="btn btn-start" onclick="toggleStream()">⚡ بدء البث المباشر</button>
        </div>

        <div class="card video-card">
            <div class="video-container">
                <div class="status-badge">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">غير متصل</span>
                </div>
                <video id="webcam" autoplay playsinline muted></video>
            </div>
        </div>
    </div>

    <!-- Modal الكاميرا لمسح الـ QR -->
    <div id="qrModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--accent); margin: 0 0 8px 0;">مسح كود QR</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">وجه الكاميرا نحو الكود الظاهر في شاشة الكمبيوتر</p>
            
            <div id="qr-reader"></div>
            
            <button class="btn btn-stop" onclick="closeQrModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let localStream = null;
        let mediaRecorder = null;
        let isStreaming = false;
        let html5QrCode = null;

        const video = document.getElementById('webcam');

        // تهيئة الكاميرا والميكروفون للـ (صوت + صورة)
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment", 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 },
                        frameRate: { max: 30 }
                    }, 
                    audio: true // تفعيل الصوت
                });
                video.srcObject = localStream;
            } catch (err) {
                alert("تعذر الوصول للكاميرا أو الميكروفون: " + err.message);
            }
        }

        function openQrModal() {
            document.getElementById('qrModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("qr-reader");
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 200, height: 200 } },
                (decodedText) => {
                    let cleanIp = decodedText.trim();
                    try {
                        let parsedUrl = new URL(cleanIp);
                        cleanIp = parsedUrl.hostname;
                    } catch (e) {
                        cleanIp = cleanIp.replace(/^https?:\/\//, '').replace(/^ws:\/\//, '').split('/')[0].split(':')[0];
                    }
                    
                    document.getElementById('serverIp').value = cleanIp;
                    closeQrModal();
                    
                    setTimeout(() => { toggleStream(); }, 300);
                },
                () => {}
            ).catch(() => {
                closeQrModal();
            });
        }

        function closeQrModal() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById('qrModal').style.display = 'none';
                }).catch(() => {
                    document.getElementById('qrModal').style.display = 'none';
                });
            } else {
                document.getElementById('qrModal').style.display = 'none';
            }
        }

        function toggleStream() {
            if (!isStreaming) {
                startAudioVideoStream();
            } else {
                stopStream();
            }
        }

        function startAudioVideoStream() {
            const ip = document.getElementById('serverIp').value.trim();
            const port = document.getElementById('serverPort').value.trim();

            if (!ip || ip.length < 7) {
                alert("يرجى إدخال IP الكمبيوتر بشكل صحيح.");
                return;
            }

            if (!localStream) {
                alert("الكاميرا والميكروفون غير متصلين.");
                return;
            }

            const targetUrl = `http://${ip}:${port}/live-stream`;

            try {
                // إعداد تسجيل وبث الصوت والفيديو معاً بحجم خفيف
                let options = { mimeType: 'video/webm;codecs=vp8,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                }

                mediaRecorder = new MediaRecorder(localStream, options);

                mediaRecorder.ondataavailable = async (event) => {
                    if (event.data.size > 0 && isStreaming) {
                        try {
                            await fetch(targetUrl, {
                                method: 'POST',
                                body: event.data,
                                headers: { 'Content-Type': 'application/octet-stream' }
                            });
                        } catch (e) {}
                    }
                };

                // إرسال قطعة صوت وفيديو كل 100 مللي ثانية لسلاسة العرض
                mediaRecorder.start(100);

                isStreaming = true;
                updateUI(true);

            } catch (err) {
                alert("خطأ في تشغيل البث: " + err.message);
                stopStream();
            }
        }

        function stopStream() {
            isStreaming = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            updateUI(false);
        }

        function updateUI(active) {
            const btn = document.getElementById('btnAction');
            const dot = document.getElementById('statusDot');
            const statusTxt = document.getElementById('statusText');

            if (active) {
                btn.innerText = "🛑 إيقاف البث الحي";
                btn.className = "btn btn-stop";
                dot.className = "dot active";
                statusTxt.innerText = "بث (صوت + صورة) يعمل 🔴";
            } else {
                btn.innerText = "⚡ بدء البث المباشر";
                btn.className = "btn btn-start";
                dot.className = "dot";
                statusTxt.innerText = "غير متصل";
            }
        }

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
